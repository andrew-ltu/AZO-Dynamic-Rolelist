<!DOCTYPE html>
<html lang="en" data-theme="tactical-blue">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AZO Operation Role List</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ============================ THEMES ============================ */
  /* Pick a theme per-op via "theme" in roster.json. Add your own below. */
  :root{
    --bg:#0a0e14;
    --panel:rgba(16,22,31,0.86);
    --panel-solid:#10161f;
    --line:rgba(118,168,216,0.18);
    --line-strong:rgba(118,168,216,0.45);
    --text:#eef3f9;
    --muted:#8fa3b8;
    --muted-2:#5f7488;
    --bad:#11161e;
    --shadow:0 18px 50px rgba(0,0,0,0.55);
    --radius:14px;
  }
  [data-theme="tactical-blue"]{ --primary:#4a90d9; --primary-2:#76a8d8; --accent:#9ed0ff; }
  [data-theme="desert"]      { --primary:#d9a441; --primary-2:#e8c073; --accent:#ffe2a6; --line:rgba(217,164,65,0.20); --line-strong:rgba(217,164,65,0.5); }
  [data-theme="jungle"]      { --primary:#57a64a; --primary-2:#7cc46f; --accent:#c4f0b8; --line:rgba(87,166,74,0.20); --line-strong:rgba(87,166,74,0.5); }
  [data-theme="night"]       { --primary:#8a7fff; --primary-2:#a89fff; --accent:#d8d3ff; --line:rgba(138,127,255,0.22); --line-strong:rgba(138,127,255,0.5); }
  [data-theme="blood"]       { --primary:#d2453f; --primary-2:#e6726d; --accent:#ffb3af; --line:rgba(210,69,63,0.22); --line-strong:rgba(210,69,63,0.5); }

  /* ============================ BASE ============================ */
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:'Inter',system-ui,sans-serif; color:var(--text); background:var(--bg);
    min-height:100vh; position:relative; overflow-x:hidden;
  }
  /* Background image layer (operation.background) + neutral tactical overlay */
  #bgLayer{
    position:fixed; inset:0; z-index:-2; background-size:cover; background-position:center;
    background-repeat:no-repeat; opacity:0.42; filter:blur(7px) saturate(0.95) contrast(1.02);
    transform:scale(1.08); transition:opacity .6s ease;
  }
  #bgOverlay{
    position:fixed; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(1100px 520px at 50% 4%, rgba(0,0,0,0) 0%, rgba(8,11,16,0.18) 70%),
      linear-gradient(180deg, rgba(8,11,16,0.42) 0%, rgba(8,11,16,0.80) 52%, var(--bg) 100%);
  }
  body::after{
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.3;
    background-image:repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
  }
  a{ color:var(--primary-2); }
  ::selection{ background:var(--primary); color:#fff; }
  .wrap{ max-width:1180px; margin:0 auto; padding:0 20px 80px; }

  /* ============================ LOGO ============================ */
  .logo{ position:relative; display:inline-grid; width:var(--ls,64px); height:var(--ls,64px); flex:0 0 auto; }
  .logo-svg,.logo-img{ grid-area:1/1; width:100%; height:100%; }
  .logo-svg{ filter:drop-shadow(0 4px 10px rgba(0,0,0,.5)); }
  .logo-img{ object-fit:contain; border-radius:50%; }

  /* ============================ HEADER ============================ */
  header.hero{ text-align:center; padding:42px 16px 24px; position:relative; }
  .brand{ display:flex; align-items:center; justify-content:center; gap:15px; margin-bottom:16px; }
  .brand .wordmark{ font-family:'Oswald'; font-weight:700; letter-spacing:3px; font-size:15px; color:var(--muted); text-transform:uppercase; }
  .brand .wordmark b{ color:var(--primary-2); }

  .op-title{
    font-family:'Oswald'; font-weight:700; text-transform:uppercase;
    font-size:clamp(34px, 6vw, 66px); line-height:1.02; letter-spacing:1.5px; margin:4px 0 6px;
    background:linear-gradient(180deg, #fff 30%, var(--primary-2) 140%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:0 2px 30px color-mix(in srgb, var(--primary) 30%, transparent);
  }
  .op-meta{ display:flex; flex-wrap:wrap; gap:10px 14px; justify-content:center; align-items:center; margin-top:10px; color:var(--muted); font-size:14px; }
  .op-meta .pill{ display:inline-flex; align-items:center; gap:7px; padding:5px 13px; border:1px solid var(--line-strong); border-radius:999px; background:var(--panel); font-weight:600; letter-spacing:.4px; }
  .op-meta .pill .k{ color:var(--muted-2); font-weight:600; text-transform:uppercase; font-size:11px; letter-spacing:1px; }
  .op-meta .pill .v{ color:var(--text); }
  .op-meta button.pill{ font:inherit; cursor:pointer; }
  .pill-map .k{ color:#36d07a; }
  .pill-map:hover{ border-color:#36d07a; background:color-mix(in srgb,#36d07a 14%, var(--panel)); }
  .pill-map .status-dot{ background:#36d07a; box-shadow:0 0 0 4px rgba(54,208,122,.22); animation:pulse 1.8s infinite; }
  .status-dot{ width:9px; height:9px; border-radius:50%; background:var(--primary-2); box-shadow:0 0 0 4px color-mix(in srgb,var(--primary) 25%, transparent); }
  .status-live .status-dot{ background:#36d07a; box-shadow:0 0 0 4px rgba(54,208,122,.22); animation:pulse 1.8s infinite; }
  @keyframes pulse{ 0%,100%{ transform:scale(1); opacity:1;} 50%{ transform:scale(1.25); opacity:.7;} }

  /* countdown */
  .countdown{ margin:24px auto 0; }
  .cd-label{ font-family:'Oswald'; text-transform:uppercase; letter-spacing:3px; font-size:12px; color:var(--muted); margin-bottom:11px; }
  .cd-units{ display:flex; justify-content:center; gap:9px; }
  .cd-unit{ min-width:76px; background:var(--panel); border:1px solid var(--line-strong); border-radius:12px; padding:13px 6px 10px; box-shadow:var(--shadow); }
  .cd-num{ font-family:'Oswald'; font-weight:700; font-size:clamp(26px,5vw,36px); line-height:1; color:#fff; display:block; font-variant-numeric:tabular-nums; }
  .cd-u{ font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-top:7px; display:block; }
  .cd-target{ margin-top:13px; font-family:'Oswald'; letter-spacing:2px; text-transform:uppercase; font-size:13px; color:var(--primary-2); }
  .cd-live{ font-family:'Oswald'; text-transform:uppercase; letter-spacing:2px; font-size:clamp(18px,4vw,24px); color:#36d07a; padding:14px; }

  .divider{ height:1px; max-width:760px; margin:26px auto 0; background:linear-gradient(90deg, transparent, var(--line-strong), transparent); }

  /* ============================ COMMAND (PLATOON HQ) ============================ */
  .command{ margin:34px auto 8px; max-width:660px; text-align:center; background:var(--panel); border:1px solid var(--line-strong); border-radius:var(--radius); padding:22px 22px 26px; box-shadow:var(--shadow); position:relative; }
  .section-tag{ display:inline-block; font-family:'Oswald'; font-weight:600; letter-spacing:3px; text-transform:uppercase; font-size:13px; color:#fff; background:var(--primary); padding:6px 16px; border-radius:7px; margin-bottom:6px; }
  .command .hq-grid{ display:grid; gap:6px; margin-top:14px; }

  /* corner brackets */
  .bracketed::before,.bracketed::after{ content:""; position:absolute; width:16px; height:16px; border:2px solid var(--line-strong); }
  .bracketed::before{ left:-1px; top:-1px; border-right:0; border-bottom:0; border-top-left-radius:6px; }
  .bracketed::after{ right:-1px; bottom:-1px; border-left:0; border-top:0; border-bottom-right-radius:6px; }

  /* ============================ SECTIONS ============================ */
  .sections{ display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:20px; margin-top:30px; }
  .sec{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); display:flex; flex-direction:column; }
  .sec-head{
    font-family:'Oswald'; font-weight:700; letter-spacing:3px; text-transform:uppercase; font-size:20px; padding:14px 18px; color:#fff;
    background:linear-gradient(180deg, color-mix(in srgb,var(--primary) 34%, transparent), transparent), var(--panel-solid);
    border-bottom:1px solid var(--line-strong); display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .sec-head .count{ font-family:'Inter'; font-size:12px; font-weight:600; color:var(--muted); letter-spacing:.5px; }
  .sec-head .lock{ font-size:15px; }
  .sec.locked .sec-head{ background:linear-gradient(180deg, rgba(120,130,145,.18), transparent), var(--panel-solid); color:var(--muted); }
  .sec-body{ padding:8px; display:flex; flex-direction:column; gap:4px; }
  .lock-note{ padding:11px 16px; font-size:11.5px; color:var(--muted-2); border-top:1px dashed var(--line); background:rgba(0,0,0,.18); display:flex; gap:8px; align-items:center; }
  .lock-note .lk{ color:var(--muted); }

  /* endorsement requirement pill shown on role label */
  .endorse-pill{
    display:inline-flex; align-items:center; margin-left:7px; padding:2px 6px;
    border-radius:4px; font-size:9px; font-weight:700; letter-spacing:.5px;
    text-transform:uppercase; vertical-align:middle;
    background:rgba(255,193,40,0.13); border:1px solid rgba(255,193,40,0.45); color:#ffc128;
  }

  /* member row */
  .slot{ display:flex; align-items:center; gap:12px; padding:9px 11px; border-radius:10px; cursor:pointer; border:1px solid transparent; transition:background .15s, border-color .15s, transform .12s; text-align:left; width:100%; background:transparent; color:inherit; font:inherit; }
  .slot:hover{ background:color-mix(in srgb,var(--primary) 12%, transparent); border-color:var(--line-strong); transform:translateX(2px); }
  .slot:focus-visible{ outline:2px solid var(--primary-2); outline-offset:2px; }
  .slot .meta{ min-width:0; flex:1; }
  .slot .nm{ font-weight:700; font-size:15px; line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .slot .rl{ font-family:'Oswald'; text-transform:uppercase; letter-spacing:1.4px; font-size:10.5px; color:var(--muted); margin-top:2px; }

  /* hierarchy: Platoon Commander (biggest) > Section Leader (mid) > roles (base) */
  .slot.lvl-section, .slot.lvl-command{ background:color-mix(in srgb,var(--primary) 9%, transparent); border-color:var(--line); }
  .slot.lvl-section{ padding:13px 12px; }
  .slot.lvl-section .nm{ font-size:22px; }
  .slot.lvl-section .rl{ font-size:12px; color:var(--primary-2); }
  .slot.lvl-command{ padding:14px 12px; }
  .slot.lvl-command .nm{ font-size:23px; }
  .slot.lvl-command .rl{ font-size:12px; color:var(--primary-2); }
  .command .slot.lvl-command .nm{ font-size:26px; }

  /* open + locked slots */
  .slot.is-open{ opacity:.72; cursor:default; }
  .slot.is-open .nm{ color:var(--muted); font-style:italic; font-weight:600; }
  .slot.is-open:hover, .slot.is-locked:hover{ transform:none; background:transparent; border-color:transparent; }
  .slot.is-locked{ opacity:.62; cursor:not-allowed; }
  .slot.is-locked .nm{ color:var(--muted); font-weight:600; font-style:normal; }

  /* attendance check/cross badge shown on slots once op.status === "complete" */
  .att-badge{ flex-shrink:0; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; margin-left:6px; }
  .att-badge.att-yes{ background:rgba(54,208,122,.16); color:#36d07a; border:1px solid rgba(54,208,122,.4); }
  .att-badge.att-no{ background:rgba(224,73,73,.14); color:#e04949; border:1px solid rgba(224,73,73,.4); }

  /* ============================ AVATAR ============================ */
  .avatar{
    --s:42px; width:var(--s); height:var(--s); flex:0 0 auto; position:relative; border-radius:50%; overflow:hidden;
    display:grid; place-items:center; font-family:'Oswald'; font-weight:600; color:#fff; font-size:calc(var(--s)*0.38);
    background:linear-gradient(150deg, hsl(var(--h,210) 55% 42%), hsl(calc(var(--h,210) + 35) 60% 28%));
    border:2px solid var(--line-strong); user-select:none; letter-spacing:.5px;
  }
  .avatar img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .avatar.empty{ background:#1a222e; border-style:dashed; color:var(--muted-2); }
  .avatar.locked{ background:#1a222e; border-style:dashed; color:var(--muted-2); font-size:calc(var(--s)*0.42); }

  /* ============================ ROSTER (expandable) ============================ */
  .roster-teaser{ margin-top:54px; }
  .roster-open{ width:100%; display:flex; justify-content:space-between; align-items:center; gap:16px; padding:22px 26px; border-radius:16px; background:var(--panel); border:1px solid var(--line-strong); cursor:pointer; color:inherit; font:inherit; transition:border-color .15s, transform .12s, background .15s; position:relative; overflow:hidden; }
  .roster-open::before{ content:""; position:absolute; right:-40px; top:-60px; width:200px; height:200px; border-radius:50%; background:radial-gradient(circle, color-mix(in srgb,var(--primary) 22%, transparent), transparent 70%); }
  .roster-open:hover{ transform:translateY(-2px); border-color:var(--primary); background:color-mix(in srgb,var(--primary) 8%, transparent); }
  .ro-title{ font-family:'Oswald'; font-weight:700; letter-spacing:5px; font-size:26px; }
  .ro-sub{ color:var(--muted); font-size:12.5px; margin-top:3px; }
  .roster-open .right{ display:flex; align-items:center; gap:16px; position:relative; }
  .ro-count{ font-family:'Oswald'; font-size:32px; font-weight:700; color:var(--primary-2); line-height:1; }
  .ro-count span{ display:block; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted-2); font-family:'Inter'; font-weight:600; }
  .ro-go{ font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); font-family:'Oswald'; }

  .roster-overlay{ position:fixed; inset:0; z-index:56; display:none; padding:24px; background:rgba(4,7,11,.8); backdrop-filter:blur(6px); overflow-y:auto; }
  .roster-overlay.show{ display:block; }
  .ro-panel{ max-width:1080px; margin:0 auto; background:var(--panel-solid); border:1px solid var(--line-strong); border-radius:18px; box-shadow:var(--shadow); overflow:hidden; }
  .ro-head{ display:flex; justify-content:space-between; align-items:center; padding:20px 26px; border-bottom:1px solid var(--line-strong); position:sticky; top:0; background:var(--panel-solid); z-index:2; }
  .ro-h-title{ font-family:'Oswald'; letter-spacing:4px; font-weight:700; font-size:22px; border-left:3px solid var(--primary); padding-left:12px; }
  .ro-h-sub{ color:var(--muted); font-size:12px; margin-top:3px; padding-left:15px; }
  .ro-body{ padding:18px 24px 30px; }
  .ro-group{ margin-top:24px; }
  .ro-group:first-child{ margin-top:6px; }
  .ro-group-h{ font-family:'Oswald'; text-transform:uppercase; letter-spacing:2px; font-size:12px; color:var(--muted); display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .ro-group-h b{ color:var(--primary-2); font-weight:600; }
  .ro-group-h::after{ content:""; flex:1; height:1px; background:var(--line); }
  .ro-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(225px,1fr)); gap:10px; }
  .ro-card{ display:flex; align-items:center; gap:12px; padding:12px; border-radius:12px; background:var(--panel); border:1px solid var(--line); border-top:2px solid var(--primary); cursor:pointer; color:inherit; font:inherit; text-align:left; transition:transform .12s, border-color .15s; }
  .ro-card:hover{ transform:translateY(-2px); border-color:var(--line-strong); }
  .ro-card .nm{ font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ro-card .rl2{ font-size:10px; color:var(--muted); font-family:'Oswald'; letter-spacing:1px; text-transform:uppercase; margin-top:2px; display:flex; align-items:center; gap:5px; }
  .ro-card .ops{ margin-left:auto; text-align:center; flex:0 0 auto; }
  .ro-card .ops b{ font-family:'Oswald'; font-size:18px; color:var(--primary-2); display:block; line-height:1; }
  .ro-card .ops i{ font-style:normal; font-size:8px; color:var(--muted-2); text-transform:uppercase; letter-spacing:.5px; }

  /* ============================ CAMPAIGN MAP ============================ */
  .map-overlay{ position:fixed; inset:0; z-index:58; display:none; padding:24px; background:rgba(4,7,11,.86); backdrop-filter:blur(6px); overflow-y:auto; }
  .map-overlay.show{ display:block; }
  .map-panel{ max-width:700px; margin:0 auto; background:var(--panel-solid); border:1px solid var(--line-strong); border-radius:16px; box-shadow:var(--shadow); overflow:hidden; }
  .map-head{ display:flex; justify-content:space-between; align-items:center; padding:16px 22px; border-bottom:1px solid var(--line-strong); position:sticky; top:0; background:var(--panel-solid); z-index:2; }
  .map-title{ font-family:'Oswald'; letter-spacing:3px; text-transform:uppercase; font-size:18px; border-left:3px solid #36d07a; padding-left:12px; display:flex; align-items:center; gap:10px; }
  .map-title small{ display:block; font-family:'Inter'; letter-spacing:.3px; text-transform:none; color:var(--muted); font-size:11px; margin-top:2px; }
  .map-body{ padding:18px 18px 22px; }
  .md-sub{ color:var(--muted); font-size:12.5px; line-height:1.55; margin:0 0 16px; max-width:64ch; }
  .md-sub em{ color:var(--muted-2); font-style:italic; }
  .map-fig{ margin:0; }
  .map-fig figcaption{ font-family:'Oswald'; text-transform:uppercase; letter-spacing:2px; font-size:11px; color:var(--muted); margin-bottom:9px; }
  .map-fig figcaption b{ color:var(--text); font-weight:600; letter-spacing:1.5px; }
  .map-img{ width:100%; height:auto; display:block; border-radius:10px; border:1px solid var(--line-strong); box-shadow:0 10px 34px rgba(0,0,0,.55); }
  .map-svg{ width:100%; height:auto; display:block; border-radius:10px; border:1px solid var(--line-strong); box-shadow:0 10px 34px rgba(0,0,0,.55); background:#efe7d4; }
  .map-view[hidden]{ display:none; }
  .map-toggle{ display:inline-flex; border:1px solid var(--line-strong); border-radius:8px; overflow:hidden; }
  .map-toggle button{ background:transparent; border:0; color:var(--muted); font-family:'Oswald',sans-serif; font-size:11.5px; letter-spacing:1.5px; text-transform:uppercase; padding:7px 13px; cursor:pointer; }
  .map-toggle button.on{ background:var(--primary); color:#fff; }

  /* ============================ MODAL ============================ */
  .modal-back{ position:fixed; inset:0; z-index:70; background:rgba(4,7,11,0.74); backdrop-filter:blur(5px); display:none; align-items:center; justify-content:center; padding:20px; opacity:0; transition:opacity .2s; }
  .modal-back.show{ display:flex; opacity:1; }
  .modal{ width:min(440px,100%); background:var(--panel-solid); border:1px solid var(--line-strong); border-radius:18px; box-shadow:var(--shadow); position:relative; overflow:hidden; transform:translateY(8px) scale(.98); transition:transform .22s; max-height:90vh; overflow-y:auto; }
  .modal-back.show .modal{ transform:none; }
  .modal-banner{ height:84px; background:linear-gradient(120deg, color-mix(in srgb,var(--primary) 55%, #000), color-mix(in srgb,var(--primary-2) 40%, #000)); position:relative; }
  .modal-banner::after{ content:""; position:absolute; inset:0; background:repeating-linear-gradient(45deg, rgba(255,255,255,.05) 0 8px, transparent 8px 16px); }
  .modal .x{ position:absolute; top:12px; right:12px; z-index:3; width:34px; height:34px; border-radius:9px; border:1px solid var(--line-strong); background:rgba(0,0,0,.35); color:#fff; font-size:18px; cursor:pointer; line-height:1; }
  .modal .x:hover{ background:var(--primary); }
  .modal-body{ padding:0 24px 24px; margin-top:-44px; position:relative; }
  .modal .avatar{ --s:88px; border-width:4px; box-shadow:0 8px 24px rgba(0,0,0,.5); }
  .modal h2{ font-family:'Oswald'; font-size:26px; margin:14px 0 2px; letter-spacing:.5px; }
  .rank-badge{ display:inline-flex; align-items:center; gap:7px; padding:5px 13px; border-radius:999px; font-family:'Oswald'; letter-spacing:1.5px; text-transform:uppercase; font-size:12px; font-weight:600; color:#fff; background:var(--primary); border:1px solid var(--line-strong); }
  .rank-socomd{ background:linear-gradient(135deg,#1f2c4a,#33508c); }
  .rank-senior-operator{ background:linear-gradient(135deg,#1d4f86,#2f6fb0); }
  .rank-operator{ background:linear-gradient(135deg,#2b6aa0,#4a90d9); }
  .rank-junior-operator{ background:linear-gradient(135deg,#3f607e,#6f9dc4); }
  .rank-recruit{ background:#374559; }

  .badges{ display:flex; flex-wrap:wrap; gap:7px; margin:14px 0; }
  /* endorsements = green */
  .badge{ display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:8px; font-size:12px; font-weight:600; background:rgba(56,193,114,.15); border:1px solid rgba(56,193,114,.5); color:#74dca0; }
  /* leadership = yellow (senior darker/gold, junior brighter) */
  .badge.lead-senior{ background:rgba(193,150,30,.18); border-color:rgba(214,170,50,.65); color:#d6a82e; }
  .badge.lead-junior{ background:rgba(255,221,70,.16); border-color:rgba(255,221,70,.6); color:#ffe24f; }

  .stat-row{ display:flex; gap:10px; margin:16px 0; }
  .stat{ flex:1; background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:11px 8px; text-align:center; }
  .stat .big{ font-family:'Oswald'; font-size:23px; font-weight:700; color:#fff; }
  .stat .lbl{ font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-top:2px; }

  .promo-label{ display:flex; justify-content:space-between; align-items:baseline; font-size:12.5px; margin:18px 0 7px; }
  .promo-label .nxt{ color:var(--muted); }
  .promo-label .pct{ font-family:'Oswald'; color:var(--primary-2); font-weight:600; }
  .promo-track{ height:9px; border-radius:999px; background:var(--bad); overflow:hidden; border:1px solid var(--line); }
  .promo-fill{ height:100%; border-radius:999px; background:linear-gradient(90deg, var(--primary), var(--primary-2)); width:0; transition:width .8s cubic-bezier(.2,.8,.2,1); box-shadow:0 0 12px color-mix(in srgb,var(--primary) 60%, transparent); }
  .promo-fill.maxed{ background:linear-gradient(90deg,#ffce4d,#ffe08a); box-shadow:0 0 12px rgba(255,206,77,.5); }
  .promo-note{ font-size:11.5px; color:var(--muted-2); margin-top:8px; }

  .attend{ margin-top:20px; }
  .attend .block-title{ font-family:'Oswald'; text-transform:uppercase; letter-spacing:2px; font-size:12px; color:var(--muted); display:flex; justify-content:space-between; align-items:baseline; margin-bottom:11px; }
  .attend .block-title .cnt{ color:var(--primary-2); letter-spacing:1px; }
  .att-grid{ display:flex; gap:6px; align-items:flex-end; }
  .att-col{ flex:1 1 0; min-width:0; text-align:center; }
  .att-dots{ display:flex; gap:4px; justify-content:center; align-items:center; min-height:15px; margin-bottom:6px; }
  .att-m{ font-family:'Oswald'; font-size:10px; letter-spacing:.5px; text-transform:uppercase; color:var(--muted); }
  .att-empty .att-m{ color:var(--muted-2); opacity:.7; }
  .opdot{ width:13px; height:13px; border-radius:50%; background:var(--bad); border:1px solid var(--line); }
  .opdot.yes{ background:var(--primary-2); border-color:var(--primary); box-shadow:0 0 6px color-mix(in srgb,var(--primary) 50%, transparent); }
  .opdot.no{ background:#0c1017; border-color:rgba(210,69,63,.5); }
  .opdot.up{ background:transparent; border-style:dashed; border-color:var(--line-strong); opacity:.65; }
  .ops-legend{ display:flex; gap:14px; margin-top:11px; font-size:10px; color:var(--muted-2); flex-wrap:wrap; }
  .ops-legend span{ display:inline-flex; align-items:center; gap:5px; }
  .ops-legend .opdot{ width:10px; height:10px; }

  /* ============================ MUSIC ============================ */
  #music{ position:fixed; right:18px; bottom:18px; z-index:40; display:flex; align-items:center; background:var(--panel); border:1px solid var(--line-strong); border-radius:999px; box-shadow:var(--shadow); overflow:hidden; }
  #music button{ background:transparent; border:0; color:var(--text); cursor:pointer; padding:12px 16px; display:flex; align-items:center; gap:9px; font:inherit; font-weight:600; font-size:13px; }
  #music button:hover{ color:var(--primary-2); }
  #music .eq{ display:inline-flex; gap:2px; height:14px; align-items:flex-end; }
  #music .eq i{ width:3px; background:var(--primary-2); border-radius:2px; height:5px; }
  #music.playing .eq i{ animation:eq .9s ease-in-out infinite; }
  #music .eq i:nth-child(2){ animation-delay:.15s; } #music .eq i:nth-child(3){ animation-delay:.3s; } #music .eq i:nth-child(4){ animation-delay:.45s; }
  @keyframes eq{ 0%,100%{ height:4px;} 50%{ height:14px;} }

  /* ============================ COMING SOON ============================ */
  #comingSoon{ position:fixed; inset:0; z-index:80; display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; background:linear-gradient(180deg, rgba(8,11,16,.92), rgba(8,11,16,.97)); backdrop-filter:blur(3px); }
  #comingSoon.show{ display:flex; }
  #comingSoon .logo{ margin-bottom:18px; animation:float 4s ease-in-out infinite; }
  @keyframes float{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-8px);} }
  #comingSoon h1{ font-family:'Oswald'; text-transform:uppercase; letter-spacing:3px; font-size:clamp(26px,5vw,46px); margin:0 0 12px; }
  #comingSoon p{ color:var(--muted); max-width:520px; font-size:15px; line-height:1.6; }
  #comingSoon .next-meta{ margin-top:18px; color:var(--primary-2); font-family:'Oswald'; letter-spacing:2px; text-transform:uppercase; font-size:14px; }
  #comingSoon .peek{ margin-top:30px; background:transparent; border:1px solid var(--line-strong); color:var(--muted); padding:11px 20px; border-radius:10px; cursor:pointer; font:inherit; font-weight:600; letter-spacing:.5px; }
  #comingSoon .peek:hover{ color:#fff; border-color:var(--primary); }

  footer{ text-align:center; color:var(--muted-2); font-size:12px; margin-top:60px; padding-top:24px; border-top:1px solid var(--line); }
  footer b{ color:var(--muted); }
  .load-err{ max-width:620px; margin:60px auto; padding:24px; border:1px solid var(--line-strong); border-radius:14px; background:var(--panel); color:var(--muted); line-height:1.6; }
  .load-err code{ background:#000; padding:2px 7px; border-radius:5px; color:var(--accent); }

  /* ============================ CLAIM MODAL ============================ */
  #claimBack{ position:fixed; inset:0; z-index:75; background:rgba(4,7,11,0.78); backdrop-filter:blur(5px); display:none; align-items:center; justify-content:center; padding:20px; }
  #claimBack.show{ display:flex; }
  #claimModal{ width:min(400px,100%); background:var(--panel-solid); border:1px solid var(--line-strong); border-radius:18px; box-shadow:var(--shadow); overflow:hidden; }
  #claimModal .cm-head{ padding:20px 22px 0; }
  #claimModal .cm-tag{ font-family:'Oswald'; text-transform:uppercase; letter-spacing:2px; font-size:11px; color:var(--primary-2); margin-bottom:6px; }
  #claimModal .cm-role{ font-family:'Oswald'; font-size:22px; font-weight:700; color:#fff; }
  #claimModal .cm-body{ padding:18px 22px 22px; }
  #claimModal label{ display:block; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  #claimInput{ width:100%; background:#0a0e14; border:1px solid var(--line-strong); border-radius:10px; padding:11px 14px; color:var(--text); font:inherit; font-size:15px; font-weight:600; outline:none; transition:border-color .15s; }
  #claimInput:focus{ border-color:var(--primary); }
  #claimInput::placeholder{ color:var(--muted-2); font-weight:400; }
  .cm-hint{ font-size:11.5px; color:var(--muted-2); margin-top:8px; }
  .cm-actions{ display:flex; gap:10px; margin-top:16px; }
  .cm-btn{ flex:1; padding:11px; border-radius:10px; font:inherit; font-size:14px; font-weight:700; cursor:pointer; border:1px solid var(--line-strong); transition:background .15s, border-color .15s; }
  .cm-btn.confirm{ background:var(--primary); border-color:var(--primary); color:#fff; }
  .cm-btn.confirm:hover{ background:color-mix(in srgb,var(--primary) 80%,#fff); }
  .cm-btn.confirm:disabled{ opacity:.5; cursor:not-allowed; }
  .cm-btn.cancel{ background:transparent; color:var(--muted); }
  .cm-btn.cancel:hover{ background:rgba(255,255,255,.05); color:var(--text); }
  #claimStatus{ font-size:12.5px; margin-top:12px; min-height:18px; }
  #claimStatus.err{ color:#e04949; }
  #claimStatus.ok{ color:#36d07a; }

  @media (max-width:560px){
    .op-meta{ font-size:12.5px; }
    #music button span.lbl{ display:none; }
    .cd-unit{ min-width:0; flex:1; }
    .roster-open{ flex-direction:column; align-items:flex-start; gap:14px; }
  }
</style>

  <!-- Roster overlay -->
  <div class="roster-overlay" id="rosterOverlay">

  <div class="modal-back" id="modalBack">

    <span class="logo" style="--ls:104px"><svg class="logo-svg" viewBox="0 0 100 100" aria-hidden="true"><use href="#azoEmblem"/></svg><img class="logo-img" src="assets/logo.png" alt="AZO" onload="this.previousElementSibling.style.display='none'" onerror="this.remove()"></span>
    <h1 id="csTitle">Stand By</h1>
    <p id="csText"></p>
    <div class="next-meta" id="csMeta"></div>

  <div id="claimBack">
    <div id="claimModal">

        <div class="cm-tag">Sign Up</div>

      <circle cx="50" cy="50" r="38" fill="#1f4f8f"/>
      <g fill="#ffffff"><circle cx="27" cy="35" r="1.7"/><circle cx="71" cy="30" r="2"/><circle cx="75" cy="57" r="1.5"/><circle cx="31" cy="63" r="1.7"/><circle cx="50" cy="23" r="1.4"/></g>
      <path d="M61 26 L39 54 L51 54 L42 77 L67 46 L55 46 Z" fill="#f2c230" stroke="#b8860b" stroke-width="1" stroke-linejoin="round"/>
      <text x="50" y="90" text-anchor="middle" font-family="Oswald, sans-serif" font-weight="700" font-size="12" fill="#e8b53a" letter-spacing="1.5">AZO</text>
    </symbol>

<script>
/* ============================================================
   AZO Dynamic Role List
   Data: roster.json (current op) + members.json (member directory)
   ============================================================ */

/* Promotion ladder. opsAttended = real ops attended in 2026.
   Thresholds are cumulative totals to REACH the next rank.
   SOCOMD = command staff (above ladder). */
const RANK_LADDER    = ['Recruit', 'Junior Operator', 'Operator', 'Senior Operator'];
const RANK_THRESHOLD = { 'Junior Operator':1, 'Operator':6, 'Senior Operator':14 };
const RANK_SORT      = { 'SOCOMD':0, 'Senior Operator':1, 'Operator':2, 'Junior Operator':3, 'Recruit':4 };

/* Attendance mirrors the AZO promotion chart (months Apr–Dec).
   Each month: ops already run ('done') + ops upcoming ('up').
   So far: Apr 1, May 1, Jun 1 run + 1 upcoming; Jul–Dec none yet. */
const ATT_MONTHS = [
  { m:'Apr', done:1, up:0 },
  { m:'May', done:1, up:0 },
  { m:'Jun', done:2, up:0 },
  { m:'Jul', done:0, up:0 },
  { m:'Aug', done:0, up:0 },
  { m:'Sep', done:0, up:0 },
  { m:'Oct', done:0, up:0 },
  { m:'Nov', done:0, up:0 },
  { m:'Dec', done:0, up:0 }
];
const OPS_SO_FAR = ATT_MONTHS.reduce((a,b)=>a+b.done,0);

let MEMBERS = {};
let countdownTimer = null;
const $ = (s,el=document)=>el.querySelector(s);

/* ---------- helpers ---------- */
function hashHue(str){ let h=0; for(let i=0;i<str.length;i++) h=(h*31+str.charCodeAt(i))>>>0; return h%360; }
function initials(name){
  const parts = name.replace(/[^A-Za-z0-9 _]/g,' ').split(/[\s_]+/).filter(Boolean);
  if(!parts.length) return '?';
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[1][0]).toUpperCase();
}
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const rankClass = r => 'rank-'+r.toLowerCase().replace(/[^a-z0-9]+/g,'-');

function member(name){
  const m = MEMBERS[name] || {};
  const attendance = m.attendance || {};
  // opsAttended is derived from the attendance arrays, not the stored field -
  // this guarantees the count and the dots can never drift out of sync.
  let opsAttended = 0;
  ATT_MONTHS.forEach(mo=>{
    const raw = attendance[mo.m];
    const arr = Array.isArray(raw) ? raw : (raw ? [true] : []);
    for(let i=0;i<mo.done;i++){ if(arr[i]) opsAttended++; }
  });
  return {
    name,
    avatar: m.avatar || '',
    opsAttended,
    discordRank: m.discordRank || 'Recruit',
    attendance,
    endorsements: Array.isArray(m.endorsements) ? m.endorsements : [],
    leadership: m.leadership || null
  };
}

/* promotion from current rank + ops attended */
function promotion(rank, ops){
  if(rank === 'SOCOMD') return { kind:'command' };
  const idx = RANK_LADDER.indexOf(rank);
  if(idx === RANK_LADDER.length-1) return { kind:'max' };          // Senior Operator
  const base = idx < 0 ? 0 : idx;                                   // unknown rank -> base of ladder
  const nextName = RANK_LADDER[base+1];
  const T = RANK_THRESHOLD[nextName];
  const progress = Math.max(0, Math.min(100, Math.round(ops/T*100)));
  return { kind:'progress', nextName, T, progress, remaining: Math.max(0, T-ops) };
}

function avatarHTML(m, size, extra=''){
  const hue = hashHue(m.name);
  const img = m.avatar ? `<img src="${esc(m.avatar)}" alt="" onerror="this.remove()">` : '';
  return `<span class="avatar ${extra}" style="--s:${size}px;--h:${hue}">${esc(initials(m.name))}${img}</span>`;
}

/* leader level for the name-size hierarchy */
function leaderLevel(role){
  if(/asst|assistant/i.test(role)) return '';
  if(/platoon commander|^commander/i.test(role)) return 'lvl-command';
  if(/section leader/i.test(role)) return 'lvl-section';
  return '';
}

/* ---------- render: role slot ---------- */
function slotHTML(roleObj, name, locked, attendedSet, showAtt, lockedLabel, claimCtx){
  const role = typeof roleObj === 'string' ? roleObj : roleObj.role;
  const endorsePill = (!locked && roleObj.endorsementRequired)
    ? `<span class="endorse-pill">${esc(roleObj.endorsementType || 'Endorsement Req.')}</span>`
    : '';
  if(locked){
    const label = lockedLabel || 'Reserved';
    return `<div class="slot is-locked">
      <span class="avatar locked" style="--s:42px">🔒</span>
      <div class="meta"><div class="nm">${esc(label)}</div><div class="rl">${esc(role)}</div></div></div>`;
  }
  if(!name){
    // Vacant — render as a clickable claim button
    const ctxJson = claimCtx ? esc(JSON.stringify(claimCtx)) : '';
    return `<button class="slot is-open" type="button" data-claim="${ctxJson}" data-role-label="${esc(role)}">
      <span class="avatar empty" style="--s:42px">+</span>
      <div class="meta"><div class="nm">Available</div><div class="rl">${esc(role)}${endorsePill}</div></div>
    </button>`;
  }
  const m = member(name);
  const lvl = leaderLevel(role);
  const av = lvl==='lvl-command' ? 54 : lvl==='lvl-section' ? 48 : 42;
  const badge = showAtt
    ? (attendedSet && attendedSet.has(name)
        ? `<span class="att-badge att-yes" title="Attended">✓</span>`
        : `<span class="att-badge att-no" title="Did not attend">✗</span>`)
    : '';
  return `<button class="slot ${lvl}" type="button" data-name="${esc(name)}">
      ${avatarHTML(m,av)}
      <div class="meta"><div class="nm">${esc(name)}</div><div class="rl">${esc(role)}${endorsePill}</div></div>
      ${badge}
    </button>`;
}

/* ---------- render: whole page ---------- */
function render(roster){
  const op = roster.operation || {};
  document.documentElement.setAttribute('data-theme', op.theme || 'tactical-blue');
  document.title = `AZO - ${op.name||'Role List'}`;

  if(op.background){
    const tryLoad = (src, fallback)=>{
      const img = new Image();
      img.onload = ()=>{ $('#bgLayer').style.backgroundImage = `url("${src}")`; };
      img.onerror = ()=>{ if(fallback) tryLoad(fallback, null); };
      img.src = src;
    };
    // Try the roster.json path first, then fall back to the standard asset path
    tryLoad(op.background, 'assets/operation-bg.png');
  } else {
    // No background in roster.json - try the default asset directly
    const img = new Image();
    img.onload = ()=>{ $('#bgLayer').style.backgroundImage = `url("assets/operation-bg.png")`; };
    img.src = 'assets/operation-bg.png';
  }

  const statusMap = { live:{cls:'status-live', txt:'Live'}, upcoming:{cls:'', txt:'Upcoming'}, complete:{cls:'', txt:'Complete'} };
  const st = statusMap[op.status] || statusMap.upcoming;
  const showAtt = op.status === 'complete';
  const attendedSet = new Set(roster.attended || []);

  const cmd = (roster.command||[]).map((r,i)=>slotHTML(r, r.member, false, attendedSet, showAtt, null,
    {sectionKey:'__command', roleIndex:i})).join('');

  const sections = (roster.sections||[]).map(sec=>{
    const roles = sec.roles||[];
    const filled = roles.filter(r=>r.member).length;
    const rows = roles.map((r,i)=>slotHTML(r, r.member, !!sec.locked, attendedSet, showAtt, sec.lockedLabel,
      {sectionKey:sec.name, roleIndex:i})).join('');
    const headRight = sec.locked
      ? `<span class="lock" title="Locked">🔒</span>`
      : `<span class="count">${filled}/${roles.length}</span>`;
    const note = sec.locked && sec.lockedLabel ? `<div class="lock-note"><span class="lk">🔒</span><span>Reserved for <b>${esc(sec.lockedLabel)}</b></span></div>` : '';
    return `<div class="sec ${sec.locked?'locked':''} bracketed">
        <div class="sec-head">${esc(sec.name)} ${headRight}</div>
        <div class="sec-body">${rows}</div>${note}
      </div>`;
  }).join('');

  const attachments = (roster.attachments||[]).map((att,attIdx)=>{
    const roles = att.roles||[];
    const filled = roles.filter(r=>r.member).length;
    const rows = roles.map((r,roleIdx)=>slotHTML(r, r.member, !!att.locked, attendedSet, showAtt, att.lockedLabel,
      {sectionKey:'__attachment', roleIndex:{attIdx, roleIdx}})).join('');
    const headRight = att.locked
      ? `<span class="lock" title="Locked">🔒</span>`
      : `<span class="count">${filled}/${roles.length}</span>`;
    const note = att.locked && att.lockedLabel ? `<div class="lock-note"><span class="lk">🔒</span><span>Reserved for <b>${esc(att.lockedLabel)}</b></span></div>` : '';
    return `<div class="sec ${att.locked?'locked':''} bracketed">
        <div class="sec-head">${esc(att.name)} ${headRight}</div>
        <div class="sec-body">${rows}</div>${note}
      </div>`;
  }).join('');

  const activeCount = Object.keys(MEMBERS).filter(k=>k!=='_comment').length;

  $('#app').innerHTML = `
    <header class="hero">
      <div class="brand">
        <span class="logo" style="--ls:64px">
          <svg class="logo-svg" viewBox="0 0 100 100" aria-hidden="true"><use href="#azoEmblem"/></svg>
          <img class="logo-img" src="assets/logo.png" alt="AZO" onload="this.previousElementSibling.style.display='none'" onerror="this.remove()">
        </span>
        <div class="wordmark">Australian <b>Zeus</b> Operations</div>
      </div>
      <div class="op-title">${esc(op.name||'Operation')}</div>
      <div class="op-meta">
        <span class="pill ${st.cls}"><span class="status-dot"></span><span class="v">${st.txt}</span></span>
        ${op.campaignMap?`<button class="pill pill-map" id="mapBtn" type="button"><span class="status-dot"></span><span class="k">LIVE:</span><span class="v">Campaign Map</span></button>`:''}
        ${op.zeus?`<span class="pill"><span class="k">Zeus</span><span class="v">${esc(op.zeus)}</span></span>`:''}
        ${op.tier?`<span class="pill"><span class="k">Tier</span><span class="v">${esc(op.tier)}</span></span>`:''}
      </div>
      ${op.countdownTo ? `
      <div class="countdown" id="countdown">
        <div class="cd-label">Operation begins in</div>
        <div class="cd-units">
          <div class="cd-unit"><span class="cd-num" data-cd="d">--</span><span class="cd-u">Days</span></div>
          <div class="cd-unit"><span class="cd-num" data-cd="h">--</span><span class="cd-u">Hours</span></div>
          <div class="cd-unit"><span class="cd-num" data-cd="m">--</span><span class="cd-u">Mins</span></div>
          <div class="cd-unit"><span class="cd-num" data-cd="s">--</span><span class="cd-u">Secs</span></div>
        </div>
        ${op.date?`<div class="cd-target">${esc(op.date)}</div>`:''}
      </div>` : (op.date?`<div class="op-meta"><span class="pill"><span class="k">Date</span><span class="v">${esc(op.date)}</span></span></div>`:'')}
      <div class="divider"></div>
    </header>

    <section class="command bracketed">
      <span class="section-tag">Platoon HQ</span>
      <div class="hq-grid">${cmd}</div>
    </section>

    <section class="sections">${sections}</section>

    ${attachments ? `<section class="sections">${attachments}</section>` : ''}

    <section class="roster-teaser">
      <button class="roster-open" id="rosterOpen" type="button">
        <div class="left">
          <div class="ro-title">ROSTER</div>
          <div class="ro-sub">All active operators - click to view, sorted by rank</div>
        </div>
        <div class="right">
          <div class="ro-count">${activeCount}<span>Operators</span></div>
          <div class="ro-go">View ▸</div>
        </div>
      </button>
    </section>

    <footer>
      <b>Australian Zeus Operations</b> · Sorry Bad Nade<br>
      Role list updates automatically from <code style="color:var(--muted)">roster.json</code>
    </footer>`;

  setupCountdown(op);
  setupMusic(op);
  setupComingSoon(op);
  setupMap(op);
  $('#rosterOpen').onclick = openRoster;
}

/* ---------- countdown ---------- */
function setupCountdown(op){
  if(countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; }
  const el = $('#countdown');
  if(!el || !op.countdownTo) return;
  const target = new Date(op.countdownTo).getTime();
  if(isNaN(target)){ el.style.display='none'; return; }
  const pad = n => String(n).padStart(2,'0');
  const tick = ()=>{
    const diff = target - Date.now();
    if(diff <= 0){
      el.innerHTML = `<div class="cd-live">⚡ Operation is live - move out!</div>${op.date?`<div class="cd-target">${esc(op.date)}</div>`:''}`;
      clearInterval(countdownTimer); countdownTimer=null; return;
    }
    const d=Math.floor(diff/86400000), h=Math.floor(diff/3600000)%24, m=Math.floor(diff/60000)%60, s=Math.floor(diff/1000)%60;
    const set=(k,v)=>{ const n=el.querySelector(`[data-cd="${k}"]`); if(n) n.textContent=v; };
    set('d',d); set('h',pad(h)); set('m',pad(m)); set('s',pad(s));
  };
  tick();
  countdownTimer = setInterval(tick, 1000);
}

/* ---------- attendance strip ----------
   Each completed op across the whole season gets a running index (0-based).
   Per current data: index 0 = Apr op, index OPS_SO_FAR-1 = most recent
   completed op. Only those two dots get a name tooltip; every other dot
   (attended or not, upcoming or not) shows no tooltip at all. */
const OP_NAME_BY_INDEX = { 0: 'Emerald Veil pt 1', [OPS_SO_FAR-1]: 'Emerald Veil pt 2' };

function attendanceStrip(m){
  let attended = 0;
  let doneIdx = 0;
  const cols = ATT_MONTHS.map(mo=>{
    const raw = m.attendance[mo.m];
    const arr = Array.isArray(raw) ? raw : (raw ? [true] : []);
    let dots = '';
    for(let i=0;i<mo.done;i++){
      const went = !!arr[i];
      if(went) attended++;
      const opName = OP_NAME_BY_INDEX[doneIdx];
      const title = opName ? ` title="${esc(opName)}"` : '';
      dots += `<span class="opdot ${went?'yes':'no'}"${title}></span>`;
      doneIdx++;
    }
    for(let i=0;i<mo.up;i++){ dots += `<span class="opdot up"></span>`; }
    const empty = (mo.done+mo.up)===0;
    return `<div class="att-col${empty?' att-empty':''}"><div class="att-dots">${dots}</div><div class="att-m">${mo.m}</div></div>`;
  }).join('');
  return { cols, attended };
}

/* ---------- profile modal ---------- */
function openProfile(name){
  const m = member(name);
  const p = promotion(m.discordRank, m.opsAttended);
  const hue = hashHue(m.name);
  const att = attendanceStrip(m);

  const leadBadge = m.leadership==='senior'
    ? `<span class="badge lead-senior">★ Senior Leadership</span>`
    : m.leadership==='junior'
    ? `<span class="badge lead-junior">★ Junior Leadership</span>` : '';

  const endorse = m.endorsements.length
    ? m.endorsements.map(e=>`<span class="badge">${esc(e)}</span>`).join('')
    : `<span class="badge" style="opacity:.6">No endorsements yet</span>`;

  let promoBlock;
  if(p.kind==='command'){
    promoBlock = `<div class="promo-label"><span class="nxt">Command staff</span><span class="pct">SOCOMD</span></div>
      <div class="promo-track"><div class="promo-fill maxed" style="width:100%"></div></div>
      <div class="promo-note">Above the operator ladder - promotion track doesn't apply.</div>`;
  } else if(p.kind==='max'){
    promoBlock = `<div class="promo-label"><span class="nxt">Top of the operator ladder</span><span class="pct">MAX</span></div>
      <div class="promo-track"><div class="promo-fill maxed" style="width:100%"></div></div>
      <div class="promo-note">Senior Operator - fully promoted.</div>`;
  } else {
    promoBlock = `<div class="promo-label"><span class="nxt">Next: <b style="color:var(--text)">${esc(p.nextName)}</b></span><span class="pct">${p.progress}%</span></div>
      <div class="promo-track"><div class="promo-fill" data-w="${p.progress}" style="width:0"></div></div>
      <div class="promo-note">${p.remaining} more op${p.remaining===1?'':'s'} to reach ${esc(p.nextName)} (needs ${p.T} total).</div>`;
  }

  $('#modalBody').innerHTML = `
    ${avatarHTML(m,88)}
    <h2>${esc(m.name)}</h2>
    <div><span class="rank-badge ${rankClass(m.discordRank)}">${esc(m.discordRank)}</span></div>
    <div class="badges">${leadBadge}${endorse}</div>
    <div class="stat-row">
      <div class="stat"><div class="big">${m.opsAttended}</div><div class="lbl">Ops 2026</div></div>
      <div class="stat"><div class="big">${m.endorsements.length}</div><div class="lbl">Endorsements</div></div>
    </div>
    ${promoBlock}
    <div class="attend">
      <div class="block-title">Attendance · 2026 <span class="cnt">${att.attended}/${OPS_SO_FAR} ops so far</span></div>
      <div class="att-grid">${att.cols}</div>
      <div class="ops-legend">
        <span><span class="opdot yes"></span> Attended</span>
        <span><span class="opdot no"></span> Missed</span>
        <span><span class="opdot up"></span> Upcoming</span>
      </div>
    </div>`;

  $('#modalBack').classList.add('show');
  requestAnimationFrame(()=>{ const f=$('.promo-fill[data-w]'); if(f) f.style.width = f.dataset.w+'%'; });
}
function closeModal(){ $('#modalBack').classList.remove('show'); }

/* ---------- roster overlay (sorted by rank) ---------- */
function openRoster(){
  const members = Object.keys(MEMBERS).filter(k=>k!=='_comment').map(member);
  const groups = {};
  members.forEach(m=>{ (groups[m.discordRank] = groups[m.discordRank] || []).push(m); });
  const order = Object.keys(groups).sort((a,b)=> (RANK_SORT[a]??9)-(RANK_SORT[b]??9) || a.localeCompare(b));

  const html = order.map(rank=>{
    const list = groups[rank].sort((a,b)=> b.opsAttended-a.opsAttended || a.name.localeCompare(b.name));
    const cards = list.map(m=>{
      return `<button class="ro-card" type="button" data-name="${esc(m.name)}">
          ${avatarHTML(m,40)}
          <div style="min-width:0">
            <div class="nm">${esc(m.name)}</div>
            <div class="rl2">${esc(m.discordRank)}</div>
          </div>
          <div class="ops"><b>${m.opsAttended}</b><i>ops</i></div>
        </button>`;
    }).join('');
    return `<div class="ro-group">
        <div class="ro-group-h">${esc(rank)} <b>${list.length}</b></div>
        <div class="ro-grid">${cards}</div>
      </div>`;
  }).join('');

  $('#rosterBody').innerHTML = html;
  $('#rosterOverlay').classList.add('show');
}
function closeRoster(){ $('#rosterOverlay').classList.remove('show'); }

/* ---------- music ---------- */
function setupMusic(op){
  const wrap=$('#music'), btn=$('#musicBtn'), lbl=$('#musicLbl'), audio=$('#audio');
  const picker=$('#anthemPicker'), a1btn=$('#anthem1Btn'), a2btn=$('#anthem2Btn');
  if(!op.music){ wrap.hidden=true; return; }
  wrap.hidden=false;

  // Two-anthem setup: op.music = anthem.mp3, op.music2 = anthem1.mp3
  const anthems = [op.music];
  if(op.music2) anthems.push(op.music2);

  // Randomly pick one on load
  let currentAnthemIdx = anthems.length > 1 ? Math.floor(Math.random() * anthems.length) : 0;

  const updateAnthemBtns = ()=>{
    if(anthems.length < 2){ picker.style.display='none'; return; }
    picker.style.display='flex';
    a1btn.style.color = currentAnthemIdx===0 ? 'var(--primary-2)' : 'var(--muted)';
    a2btn.style.color = currentAnthemIdx===1 ? 'var(--primary-2)' : 'var(--muted)';
  };

  const loadAnthemIdx = (idx)=>{
    const wasPlaying = !audio.paused;
    currentAnthemIdx = idx;
    audio.pause();
    audio.src = anthems[idx];
    audio.load();
    audio.volume = (typeof op.musicVolume==='number') ? op.musicVolume : 0.15;
    updateAnthemBtns();
    if(wasPlaying) audio.play().catch(()=>{});
  };

  audio.volume = (typeof op.musicVolume==='number') ? op.musicVolume : 0.15;
  loadAnthemIdx(currentAnthemIdx);

  const setUI = playing=>{ wrap.classList.toggle('playing',playing); lbl.textContent = playing?'Pause anthem':'Play anthem'; };
  const start = ()=> audio.play().then(()=>{ setUI(true); return true; }).catch(()=>{ setUI(false); return false; });

  btn.onclick = ()=>{ if(audio.paused) start(); else { audio.pause(); setUI(false); } };
  a1btn.onclick = ()=>{ loadAnthemIdx(0); start(); };
  a2btn.onclick = ()=>{ loadAnthemIdx(1); start(); };

  updateAnthemBtns();

  // Autoplay quietly on load
  start().then(ok=>{
    if(ok) return;
    const EV=['pointerdown','keydown','scroll','touchstart'];
    const kick=()=> start().then(s=>{ if(s) EV.forEach(e=>window.removeEventListener(e,kick)); });
    EV.forEach(e=>window.addEventListener(e,kick,{passive:true}));
  });
}

/* ---------- coming soon ---------- */
function setupComingSoon(op){
  const cs=$('#comingSoon');
  if(op.status!=='complete'){ cs.classList.remove('show'); return; }
  $('#csTitle').textContent = 'Operation Complete';
  $('#csText').textContent = op.comingSoonText || 'A new role list will be released soon. Stand by for the next operation.';
  $('#csMeta').textContent = op.name ? `Last deployment - ${op.name}` : '';
  const fb = $('#csFeedback');
  if(op.feedbackForm){ fb.href = op.feedbackForm; fb.style.display='inline-block'; }
  else { fb.style.display='none'; }
  cs.classList.add('show');
  $('#csPeek').onclick = ()=> cs.classList.remove('show');
}

/* ---------- campaign map ---------- */
function setupMap(op){
  const btn = $('#mapBtn');
  if(!op.campaignMap || !btn) return;
  btn.onclick = ()=> $('#mapOverlay').classList.add('show');
  const mt = $('#mapToggle');
  if(mt) mt.querySelectorAll('button').forEach(b=> b.onclick = ()=>{
    mt.querySelectorAll('button').forEach(x=> x.classList.toggle('on', x===b));
    document.querySelectorAll('.map-view').forEach(v=>{ v.hidden = (v.dataset.view !== b.dataset.view); });
  });
}
function closeMap(){ $('#mapOverlay').classList.remove('show'); }

/* ---------- events ---------- */
document.addEventListener('click', e=>{
  // Claim a vacant slot
  const claimBtn = e.target.closest('[data-claim]');
  if(claimBtn && claimBtn.dataset.claim){
    try{
      const ctx = JSON.parse(claimBtn.dataset.claim);
      const roleLabel = claimBtn.dataset.roleLabel || 'Role';
      openClaim(ctx.sectionKey, ctx.roleIndex, roleLabel);
    } catch(_){}
    return;
  }
  // Open member profile
  const t = e.target.closest('[data-name]');
  if(t){ openProfile(t.dataset.name); }
});
$('#modalClose').onclick = closeModal;
$('#modalBack').onclick = e=>{ if(e.target===$('#modalBack')) closeModal(); };
$('#rosterClose').onclick = closeRoster;
$('#rosterOverlay').onclick = e=>{ if(e.target===$('#rosterOverlay')) closeRoster(); };
$('#mapClose').onclick = closeMap;
$('#mapOverlay').onclick = e=>{ if(e.target===$('#mapOverlay')) closeMap(); };
document.addEventListener('keydown', e=>{
  if(e.key!=='Escape') return;
  if($('#claimBack').classList.contains('show')) closeClaim();
  else if($('#modalBack').classList.contains('show')) closeModal();
  else if($('#mapOverlay').classList.contains('show')) closeMap();
  else if($('#rosterOverlay').classList.contains('show')) closeRoster();
});

/* ---------- claim slot ---------- */
const GITHUB_OWNER = 'andrew-ltu';
const GITHUB_REPO  = 'AZO-Dynamic-Rolelist';
const GITHUB_FILE  = 'roster.json';
// Replace the value below with your fine-grained PAT (Contents: Read & Write)
const GITHUB_TOKEN = 'PASTE_YOUR_TOKEN_HERE';

let claimContext = null; // { section, roleIndex, roleLabel }
let liveRoster   = null; // latest fetched roster object
let rosterSha    = null; // file SHA needed for GitHub API update

function openClaim(sectionKey, roleIndex, roleLabel){
  claimContext = { sectionKey, roleIndex, roleLabel };
  $('#claimRoleLabel').textContent = roleLabel;
  $('#claimInput').value = '';
  $('#claimStatus').textContent = '';
  $('#claimStatus').className = '';
  $('#claimConfirm').disabled = false;
  $('#claimBack').classList.add('show');
  setTimeout(()=> $('#claimInput').focus(), 80);
}
function closeClaim(){
  $('#claimBack').classList.remove('show');
  claimContext = null;
}

async function submitClaim(){
  const name = $('#claimInput').value.trim();
  if(!name){ setClaimStatus('Enter your name first.','err'); return; }

  const { sectionKey, roleIndex } = claimContext;
  const btn = $('#claimConfirm');
  btn.disabled = true;
  setClaimStatus('Saving…','');

  try{
    // 1. Re-fetch latest roster + SHA to avoid clobbering concurrent edits
    const apiBase = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
    const headers  = { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github+json' };

    const metaRes = await fetch(apiBase, { headers });
    if(!metaRes.ok) throw new Error(`GitHub fetch failed: ${metaRes.status}`);
    const meta = await metaRes.json();
    rosterSha = meta.sha;
    const roster = JSON.parse(atob(meta.content.replace(/
/g,'')));

    // 2. Find the slot and assign
    let slot = null;
    if(sectionKey === '__command'){
      slot = roster.command?.[roleIndex];
    } else if(sectionKey === '__attachment'){
      slot = roster.attachments?.[roleIndex.attIdx]?.roles?.[roleIndex.roleIdx];
    } else {
      const sec = roster.sections?.find(s=>s.name===sectionKey);
      if(sec) slot = sec.roles?.[roleIndex];
    }

    if(!slot) throw new Error('Role not found in roster — try refreshing.');
    if(slot.member) throw new Error(`This slot was just claimed by ${slot.member}. Refresh to see the latest.`);
    slot.member = name;

    // 3. Write back
    const body = JSON.stringify({
      message: `Sign-up: ${name} → ${slot.role}`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(roster, null, 2)))),
      sha: rosterSha
    });
    const putRes = await fetch(apiBase, { method:'PUT', headers:{ ...headers,'Content-Type':'application/json' }, body });
    if(!putRes.ok){
      const err = await putRes.json().catch(()=>({}));
      throw new Error(err.message || `GitHub write failed: ${putRes.status}`);
    }

    setClaimStatus(`Locked in! Welcome to the op, ${name}.`, 'ok');
    liveRoster = roster;

    // Re-render after short delay so user sees the success message
    setTimeout(()=>{ closeClaim(); render(roster); }, 1200);

  } catch(e){
    setClaimStatus(e.message, 'err');
    btn.disabled = false;
  }
}

function setClaimStatus(msg, cls){
  const el = $('#claimStatus');
  el.textContent = msg;
  el.className = cls;
}

$('#claimCancel').onclick = closeClaim;
$('#claimBack').onclick = e=>{ if(e.target===$('#claimBack')) closeClaim(); };
$('#claimConfirm').onclick = submitClaim;
$('#claimInput').addEventListener('keydown', e=>{ if(e.key==='Enter') submitClaim(); });

/* ---------- boot ---------- */
(async function(){
  try{
    const [roster, members] = await Promise.all([
      fetch('roster.json',{cache:'no-store'}).then(r=>{ if(!r.ok) throw new Error('roster.json '+r.status); return r.json(); }),
      fetch('members.json',{cache:'no-store'}).then(r=>r.ok?r.json():{}).catch(()=>({}))
    ]);
    MEMBERS = members || {};
    render(roster);
  }catch(err){
    $('#app').innerHTML = `<div class="load-err">
      <h2 style="font-family:Oswald;color:var(--text)">Couldn't load the role list</h2>
      <p>${esc(err.message)}</p>
      <p>If you opened this file directly (<code>file://</code>), browsers block <code>fetch()</code> of local files.
      Run a tiny local server first - e.g. double-click <code>serve.ps1</code> - then open
      <code>http://localhost:8770</code>. On GitHub Pages it just works.</p>
    </div>`;
    console.error(err);
  }
})();
