<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#7d8a93"/>
      <stop offset="0.35" stop-color="#b89a73"/>
      <stop offset="0.62" stop-color="#d8b27a"/>
      <stop offset="0.8" stop-color="#e3c184"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff3d6"/>
      <stop offset="0.4" stop-color="#f6d589"/>
      <stop offset="1" stop-color="#e3c184" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a6a3f"/>
      <stop offset="1" stop-color="#3e2f1c"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1600" height="640" fill="url(#sky)"/>
  <!-- low sun haze -->
  <circle cx="1080" cy="560" r="430" fill="url(#sun)"/>
  <circle cx="1080" cy="560" r="70" fill="#fff0cf" opacity="0.9"/>

  <!-- distant escarpment / hills -->
  <path d="M0 560 L210 512 L430 548 L640 506 L900 540 L1180 500 L1600 544 L1600 640 L0 640 Z" fill="#9c8765" opacity="0.55"/>
  <path d="M0 590 L260 556 L520 586 L820 552 L1120 586 L1380 560 L1600 588 L1600 640 L0 640 Z" fill="#7d6647" opacity="0.7"/>

  <!-- ground -->
  <rect y="620" width="1600" height="280" fill="url(#ground)"/>
  <path d="M0 624 Q400 606 800 626 T1600 624 L1600 900 L0 900 Z" fill="#4a3a22"/>

  <!-- scrub grass tufts -->
  <g stroke="#5d4a2a" stroke-width="3" stroke-linecap="round" opacity="0.6">
    <path d="M120 720 l-8 -26 M128 720 l0 -30 M136 720 l8 -24"/>
    <path d="M520 760 l-8 -26 M528 760 l0 -30 M536 760 l8 -24"/>
    <path d="M1180 740 l-8 -26 M1188 740 l0 -30 M1196 740 l8 -24"/>
    <path d="M860 800 l-8 -26 M868 800 l0 -30 M876 800 l8 -24"/>
  </g>

  <!-- acacia tree (large, left) -->
  <g fill="#1c160d">
    <path d="M300 640 q6 -120 -2 -190 q-2 -18 6 -22 q10 -4 10 14 q0 70 8 196 Z"/>
    <path d="M308 470 q-70 -34 -150 -22 q80 -28 156 -2 q70 -34 150 -10 q-86 -8 -150 18 q-2 6 -6 16 Z"/>
    <ellipse cx="300" cy="452" rx="172" ry="30"/>
  </g>

  <!-- acacia tree (small, right) -->
  <g fill="#16110a" opacity="0.92">
    <path d="M1300 642 q4 -78 -1 -120 q-1 -12 4 -14 q7 -2 7 9 q0 44 6 125 Z"/>
    <ellipse cx="1302" cy="512" rx="104" ry="20"/>
    <path d="M1306 506 q-46 -20 -98 -14 q52 -18 100 -2 q46 -20 96 -8 q-54 -6 -96 12 Z"/>
  </g>

  <!-- faint dust haze over horizon -->
  <rect y="560" width="1600" height="120" fill="#e3c184" opacity="0.12"/>
</svg>
