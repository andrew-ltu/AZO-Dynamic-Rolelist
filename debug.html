<!DOCTYPE html>
<html>
<head>
    <title>Debug Test</title>
</head>
<body>
    <h1>Debug Test</h1>
    <div id="output"></div>
    <script>
        const output = document.getElementById('output');
        
        async function test() {
            try {
                output.innerHTML += '<p>Starting tests...</p>';
                
                // Test 1: Can we fetch roster.json?
                output.innerHTML += '<p>Test 1: Fetching roster.json...</p>';
                const rosterRes = await fetch('roster.json', {cache: 'no-store'});
                output.innerHTML += `<p>Roster status: ${rosterRes.status}</p>`;
                const rosterData = await rosterRes.json();
                output.innerHTML += `<p>Roster loaded: ${JSON.stringify(rosterData).substring(0, 100)}...</p>`;
                
                // Test 2: Can we fetch members.json?
                output.innerHTML += '<p>Test 2: Fetching members.json...</p>';
                const membersRes = await fetch('members.json', {cache: 'no-store'});
                output.innerHTML += `<p>Members status: ${membersRes.status}</p>`;
                const membersData = await membersRes.json();
                output.innerHTML += `<p>Members loaded: ${JSON.stringify(membersData).substring(0, 100)}...</p>`;
                
                output.innerHTML += '<p style="color: green;">All tests passed!</p>';
            } catch (err) {
                output.innerHTML += `<p style="color: red;">ERROR: ${err.message}</p>`;
                console.error(err);
            }
        }
        
        test();
    </script>
</body>
</html>
