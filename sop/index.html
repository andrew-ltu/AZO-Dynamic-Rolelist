<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AZO SOPs - Standard Operating Procedures</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a1628 0%, #1a2942 100%);
      color: #e0e6ed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: rgba(10, 22, 40, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(61, 135, 212, 0.3);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #3d87d4;
      letter-spacing: 2px;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #3d87d4;
    }
    .username {
      font-size: 16px;
      font-weight: 600;
    }
    .logout-btn {
      background: #c8102e;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .logout-btn:hover { background: #a00d25; }
    .container {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 40px;
    }
    .welcome {
      text-align: center;
      margin-bottom: 60px;
    }
    .welcome h1 {
      font-size: 42px;
      margin-bottom: 10px;
      color: #fff;
    }
    .welcome p {
      font-size: 18px;
      color: #a0b5cc;
    }
    .sop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
    }
    .sop-card {
      background: rgba(26, 41, 66, 0.6);
      border: 1px solid rgba(61, 135, 212, 0.2);
      border-radius: 12px;
      padding: 30px;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .sop-card:hover {
      background: rgba(26, 41, 66, 0.9);
      border-color: rgba(61, 135, 212, 0.5);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(61, 135, 212, 0.2);
    }
    .sop-card.locked {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .sop-card.locked:hover {
      transform: none;
      box-shadow: none;
    }
    .sop-icon {
      font-size: 36px;
      margin-bottom: 15px;
    }
    .sop-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #3d87d4;
    }
    .sop-description {
      font-size: 14px;
      color: #a0b5cc;
      line-height: 1.6;
    }
    .lock-icon {
      float: right;
      opacity: 0.5;
    }
    .login-container {
      max-width: 500px;
      margin: 100px auto;
      padding: 40px;
      background: rgba(26, 41, 66, 0.8);
      border: 1px solid rgba(61, 135, 212, 0.3);
      border-radius: 12px;
      text-align: center;
    }
    .login-container h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }
    .login-container p {
      font-size: 16px;
      color: #a0b5cc;
      margin-bottom: 30px;
    }
    .discord-btn {
      background: #5865F2;
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .discord-btn:hover { background: #4752C4; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const API_BASE = 'https://azo-dynamic-rolelist-api.andrewtb02.workers.dev';
    let currentUser = null;

    async function init() {
      // Check for token in URL or localStorage
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token') || localStorage.getItem('azo_token');
      
      if (token) {
        localStorage.setItem('azo_token', token);
        // Remove token from URL
        if (urlParams.has('token')) {
          window.history.replaceState({}, document.title, window.location.pathname);
        }
        
        // Fetch user data
        try {
          const response = await fetch(`${API_BASE}/api/user`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          
          if (response.ok) {
            const data = await response.json();
            currentUser = data.user;
            renderDashboard();
            return;
          } else {
            localStorage.removeItem('azo_token');
          }
        } catch (error) {
          console.error('Auth error:', error);
          localStorage.removeItem('azo_token');
        }
      }
      
      renderLogin();
    }

    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="login-container">
          <h1>🔒 AZO SOPs</h1>
          <p>Standard Operating Procedures for Australian Zeus Operations</p>
          <button class="discord-btn" onclick="login()">
            <svg width="24" height="24" viewBox="0 0 71 55" fill="none"><g clip-path="url(#clip0)"><path d="M60.1045 4.8978C55.5792 2.8214 50.7265 1.2916 45.6527 0.41542C45.5603 0.39851 45.468 0.440769 45.4204 0.525289C44.7963 1.6353 44.105 3.0834 43.6209 4.2216C38.1637 3.4046 32.7345 3.4046 27.3892 4.2216C26.905 3.0581 26.1886 1.6353 25.5617 0.525289C25.5141 0.443589 25.4218 0.40133 25.3294 0.41542C20.2584 1.2888 15.4057 2.8186 10.8776 4.8978C10.8384 4.9147 10.8048 4.9429 10.7825 4.9795C1.57795 18.7309 -0.943561 32.1443 0.293408 45.3914C0.299005 45.4562 0.335386 45.5182 0.385761 45.5576C6.45866 50.0174 12.3413 52.7249 18.1147 54.5195C18.2071 54.5477 18.305 54.5139 18.3638 54.4378C19.7295 52.5728 20.9469 50.6063 21.9907 48.5383C22.0523 48.4172 21.9935 48.2735 21.8676 48.2256C19.9366 47.4931 18.0979 46.6 16.3292 45.5858C16.1893 45.5041 16.1781 45.304 16.3068 45.2082C16.679 44.9293 17.0513 44.6391 17.4067 44.3461C17.471 44.2926 17.5606 44.2813 17.6362 44.3151C29.2558 49.6202 41.8354 49.6202 53.3179 44.3151C53.3935 44.2785 53.4831 44.2898 53.5502 44.3433C53.9057 44.6363 54.2779 44.9293 54.6529 45.2082C54.7816 45.304 54.7732 45.5041 54.6333 45.5858C52.8646 46.6197 51.0259 47.4931 49.0921 48.2228C48.9662 48.2707 48.9102 48.4172 48.9718 48.5383C50.038 50.6034 51.2554 52.5699 52.5959 54.435C52.6519 54.5139 52.7526 54.5477 52.845 54.5195C58.6464 52.7249 64.529 50.0174 70.6019 45.5576C70.6551 45.5182 70.6887 45.459 70.6943 45.3942C72.1747 30.0791 68.2147 16.7757 60.1968 4.9823C60.1772 4.9429 60.1437 4.9147 60.1045 4.8978ZM23.7259 37.3253C20.2276 37.3253 17.3451 34.1136 17.3451 30.1693C17.3451 26.225 20.1717 23.0133 23.7259 23.0133C27.308 23.0133 30.1626 26.2532 30.1066 30.1693C30.1066 34.1136 27.28 37.3253 23.7259 37.3253ZM47.3178 37.3253C43.8196 37.3253 40.9371 34.1136 40.9371 30.1693C40.9371 26.225 43.7636 23.0133 47.3178 23.0133C50.9 23.0133 53.7545 26.2532 53.6986 30.1693C53.6986 34.1136 50.9 37.3253 47.3178 37.3253Z" fill="currentColor"/></g><defs><clipPath id="clip0"><rect width="71" height="55" fill="white"/></clipPath></defs></svg>
            Login with Discord
          </button>
        </div>
      `;
    }

    function renderDashboard() {
      const avatarUrl = currentUser.avatar 
        ? `https://cdn.discordapp.com/avatars/${currentUser.id}/${currentUser.avatar}.png`
        : 'https://cdn.discordapp.com/embed/avatars/0.png';
      
      const sops = [
        { id: 'member', title: 'Member SOPs', icon: '👤', description: 'General operating procedures for all AZO members', requiredRole: null },
        { id: 'alpha', title: 'Alpha SOPs', icon: '🅰️', description: 'Alpha team specific procedures', requiredRole: 'Alpha' },
        { id: 'bravo', title: 'Bravo SOPs', icon: '🅱️', description: 'Bravo team specific procedures', requiredRole: 'Bravo' },
        { id: 'charlie', title: 'Charlie SOPs', icon: '🔶', description: 'Charlie team specific procedures', requiredRole: 'Charlie' },
        { id: 'admin', title: 'Admin SOPs', icon: '⚙️', description: 'Administrative and leadership procedures', requiredRole: 'admin' }
      ];
      
      const sopCards = sops.map(sop => {
        const hasAccess = !sop.requiredRole || 
                          currentUser.isAdmin || 
                          (sop.requiredRole === 'admin' && currentUser.isAdmin) ||
                          (sop.requiredRole && currentUser.roles.includes(sop.requiredRole));
        
        const lockIcon = hasAccess ? '' : '<span class="lock-icon">🔒</span>';
        const cardClass = hasAccess ? 'sop-card' : 'sop-card locked';
        const onclick = hasAccess ? `onclick="window.location.href='${sop.id}.html'"` : '';
        
        return `
          <a href="#" class="${cardClass}" ${onclick}>
            ${lockIcon}
            <div class="sop-icon">${sop.icon}</div>
            <div class="sop-title">${sop.title}</div>
            <div class="sop-description">${sop.description}</div>
          </a>
        `;
      }).join('');
      
      document.getElementById('app').innerHTML = `
        <div class="header">
          <div class="logo">AZO · SOPs</div>
          <div class="user-info">
            <img src="${avatarUrl}" alt="${currentUser.displayName}" class="avatar">
            <span class="username">${currentUser.displayName}</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
          </div>
        </div>
        <div class="container">
          <div class="welcome">
            <h1>Welcome, ${currentUser.displayName}</h1>
            <p>Select a Standard Operating Procedure to view</p>
          </div>
          <div class="sop-grid">
            ${sopCards}
          </div>
        </div>
      `;
    }

    function login() {
      window.location.href = `${API_BASE}/auth/login`;
    }

    async function logout() {
      const token = localStorage.getItem('azo_token');
      if (token) {
        await fetch(`${API_BASE}/api/logout`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        localStorage.removeItem('azo_token');
      }
      window.location.reload();
    }

    init();
  </script>
</body>
</html>
