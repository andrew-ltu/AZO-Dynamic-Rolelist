name: Sync Discord roles & avatars

on:
  workflow_dispatch: {}          # lets you run it manually from the Actions tab
  schedule:
    - cron: '0 15 * * *'         # daily ~01:00 AEST (15:00 UTC)

permissions:
  contents: write                # so the job can commit members.json + avatars

concurrency:
  group: discord-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync members from Discord
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: node scripts/sync_discord.mjs
      - name: Commit any updates
        run: |
          git config user.name  "azo-roster-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add members.json assets/avatars
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync Discord roles & avatars [skip ci]"
            git push
          fi
