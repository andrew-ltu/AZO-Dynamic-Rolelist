name: Claim Slot

on:
  workflow_dispatch:
    inputs:
      sectionKey:
        description: 'Section key (__command, __attachment, or section name)'
        required: true
      roleIndex:
        description: 'Role index (JSON string — number or {attIdx,roleIdx})'
        required: true
      memberName:
        description: 'Name of the person claiming the slot'
        required: true

permissions:
  contents: write

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ROSTER_TOKEN }}

      - name: Apply claim
        env:
          SECTION_KEY: ${{ github.event.inputs.sectionKey }}
          ROLE_INDEX:  ${{ github.event.inputs.roleIndex }}
          MEMBER_NAME: ${{ github.event.inputs.memberName }}
        run: |
          python3 - << 'PYEOF'
          import json, os, sys

          section_key = os.environ['SECTION_KEY']
          role_index_raw = os.environ['ROLE_INDEX']
          member_name = os.environ['MEMBER_NAME'].strip()

          if not member_name:
              sys.exit('Error: member name is empty')

          with open('roster.json', 'r') as f:
              roster = json.load(f)

          slot = None
          try:
              if section_key == '__command':
                  idx = int(role_index_raw)
                  slot = roster['command'][idx]
              elif section_key == '__attachment':
                  idxs = json.loads(role_index_raw)
                  slot = roster['attachments'][idxs['attIdx']]['roles'][idxs['roleIdx']]
              else:
                  sec = next((s for s in roster.get('sections', []) if s['name'] == section_key), None)
                  if not sec:
                      sys.exit(f'Error: section "{section_key}" not found')
                  slot = sec['roles'][int(role_index_raw)]
          except (KeyError, IndexError, ValueError, json.JSONDecodeError) as e:
              sys.exit(f'Error finding slot: {e}')

          if slot.get('member'):
              sys.exit(f'Slot already taken by {slot["member"]}')

          slot['member'] = member_name

          with open('roster.json', 'w') as f:
              json.dump(roster, f, indent=2)

          print(f'Assigned {member_name} to {slot["role"]}')
          PYEOF

      - name: Commit and push
        run: |
          git config user.name  "AZO Roster Bot"
          git config user.email "roster-bot@azo.ops"
          git add roster.json
          git commit -m "Sign-up: ${{ github.event.inputs.memberName }} → slot claim"
          git push
